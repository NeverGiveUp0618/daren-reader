<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字阅览室</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ============================================================
   THEMES  (4套皮肤)
   ============================================================ */
:root {                         /* 暗夜紫  (默认) */
  --ac:    #9d7fe0;
  --ac2:   #6b4faa;
  --ac-bg: rgba(157,127,224,.14);
  --p0:    #0d0d18;
  --p1:    #13131f;
  --p2:    #1e1e2e;
  --p3:    #28283c;
  --p4:    #38385a;
  --t0:    #e8e4f4;
  --t1:    #9090b4;
  --t2:    #5a5a78;
  --bd:    #28283c;
  --bd2:   #3c3c60;
  --paper: #f8f4ee;
  --shadow:rgba(0,0,0,.7);
}

/* ============================================================
   BASE
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
  background: var(--p0); height: 100vh; overflow: hidden; color: var(--t0);
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 3px; }

/* ============================================================
   LOADING
   ============================================================ */
#loading {
  position: fixed; inset: 0; background: rgba(0,0,0,.75);
  display: none; align-items: center; justify-content: center;
  z-index: 9999; flex-direction: column; gap: 14px;
  color: var(--ac); font-size: .95rem; letter-spacing: .1em;
}
.spinner { width: 34px; height: 34px; border: 3px solid var(--bd); border-top-color: var(--ac); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   BOOKSHELF
   ============================================================ */
#view-shelf { height: 100vh; overflow-y: auto; background: var(--p0); }
.shelf-header { text-align: center; padding: 44px 20px 28px; position: relative; border-bottom: 1px solid var(--bd); margin-bottom: 4px; }
.shelf-header h1 { font-size: 1.72rem; color: var(--t0); letter-spacing: .2em; }
.shelf-header h1 em { font-style: normal; color: var(--ac); }
.shelf-header p { color: var(--t1); margin-top: 8px; font-size: .82rem; letter-spacing: .1em; }
#btn-skin-shelf { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); background: var(--p2); border: 1px solid var(--bd2); border-radius: 20px; color: var(--t1); padding: 8px 16px; cursor: pointer; font-size: .82rem; font-family: inherit; transition: all .15s; white-space: nowrap; }
#btn-skin-shelf:hover { background: var(--p3); color: var(--t0); }
.shelf-section { padding: 12px 28px 0; }
.shelf-section-label { color: var(--t2); font-size: .72rem; letter-spacing: .3em; padding: 0 2px 8px; }
.shelf-row { display: flex; flex-wrap: wrap; gap: 16px; padding: 12px 0 20px; border-bottom: 1px solid var(--bd); margin-bottom: 4px; }
.book-card { width: 124px; height: 172px; border-radius: 6px 12px 12px 6px; cursor: pointer; position: relative; display: flex; flex-direction: column; padding: 13px 11px 10px; overflow: hidden; user-select: none; transition: transform .22s ease, box-shadow .22s ease; box-shadow: -3px 4px 16px var(--shadow), inset -2px 0 6px rgba(0,0,0,.22); }
.book-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: rgba(0,0,0,.28); border-radius: 6px 0 0 6px; }
.book-card::after { content: ''; position: absolute; right: 0; top: 4px; bottom: 4px; width: 4px; background: repeating-linear-gradient(180deg,#f0e8d0 0px,#f0e8d0 1px,#ddd4b8 1px,#ddd4b8 2px); border-radius: 0 3px 3px 0; }
.book-card:hover { transform: translateY(-10px) scale(1.04); box-shadow: -4px 18px 32px var(--shadow), inset -2px 0 6px rgba(0,0,0,.3); }
.book-num { font-size: .62rem; font-family: 'Courier New',monospace; color: rgba(255,255,255,.38); }
.book-title-card { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; font-size: .9rem; font-weight: bold; color: rgba(255,255,255,.92); line-height: 1.55; padding: 4px 0; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
.book-sub { font-size: .62rem; color: rgba(255,255,255,.42); text-align: center; background: rgba(0,0,0,.2); border-radius: 8px; padding: 2px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.book-badge { position: absolute; top: 8px; right: 10px; font-size: .62rem; color: rgba(255,215,0,.8); }
.book-progress-strip { position: absolute; bottom: 0; left: 6px; right: 4px; height: 3px; background: rgba(0,0,0,.25); }
.book-progress-fill { height: 100%; background: var(--ac); opacity: .6; transition: width .3s; border-radius: 0 2px 2px 0; }

/* ============================================================
   READER
   ============================================================ */
#view-reader { display: none; height: 100vh; flex-direction: column; background: var(--p0); }
.toolbar { display: flex; align-items: center; gap: 6px; padding: 0 12px; height: 54px; background: var(--p1); border-bottom: 1px solid var(--bd); flex-shrink: 0; overflow: hidden; }
.toolbar-btn { padding: 8px 15px; border: 1px solid var(--bd2); border-radius: 8px; background: var(--p2); color: var(--t1); cursor: pointer; font-size: .85rem; white-space: nowrap; transition: background .12s, color .12s; font-family: inherit; min-height: 38px; }
.toolbar-btn:hover  { background: var(--p3); color: var(--t0); }
.toolbar-btn.active { background: var(--ac-bg); border-color: var(--ac2); color: var(--ac); }
.toolbar-divider { width: 1px; height: 22px; background: var(--bd); flex-shrink: 0; }
#book-title-bar { flex: 1; text-align: center; font-size: .85rem; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 6px; }
.zoom-group { display: flex; align-items: center; gap: 4px; }
#zoom-pct { font-size: .76rem; color: var(--t2); min-width: 38px; text-align: center; }
.reader-body { flex: 1; display: flex; overflow: hidden; }
#reader-main { flex: 1; overflow: auto; background: var(--p0); display: flex; justify-content: center; align-items: flex-start; }
#page-container { padding: 20px; display: flex; justify-content: center; min-width: 100%; }
#canvas-wrap { position: relative; display: inline-block; box-shadow: 0 4px 40px var(--shadow); line-height: 0; }
#pdf-canvas { display: block; background: white; }
#annot-overlay { position: absolute; inset: 0; pointer-events: none; }
#annot-overlay.note-mode { pointer-events: all; cursor: crosshair; }
#scroll-wrap { display: none; flex-direction: column; align-items: center; gap: 8px; padding: 20px; width: 100%; }
.scroll-canvas { display: block; background: white; box-shadow: 0 2px 14px var(--shadow); }
.scroll-page-label { color: var(--t2); font-size: .7rem; padding: 2px 0 10px; text-align: center; width: 100%; }
@keyframes slideIn     { from { opacity:0; transform:translateX(20px);  } to { opacity:1; transform:none; } }
@keyframes slideInLeft { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:none; } }
.anim-right { animation: slideIn .18s ease; }
.anim-left  { animation: slideInLeft .18s ease; }
.reader-footer { display: flex; align-items: center; justify-content: center; gap: 14px; height: 52px; background: var(--p1); border-top: 1px solid var(--bd); flex-shrink: 0; }
.footer-btn { padding: 9px 24px; border: 1px solid var(--bd2); border-radius: 9px; background: var(--p2); color: var(--t0); cursor: pointer; font-size: .92rem; font-family: inherit; min-height: 40px; transition: background .12s; }
.footer-btn:hover    { background: var(--p3); }
.footer-btn:disabled { opacity: .25; cursor: default; background: var(--p2); }
#page-in { width: 54px; text-align: center; background: var(--p0); border: 1px solid var(--bd2); border-radius: 7px; color: var(--t0); padding: 7px; font-size: .9rem; }
#page-total  { color: var(--t2); font-size: .86rem; }
#progress-pct{ color: var(--t2); font-size: .78rem; min-width: 36px; }

/* ============================================================
   NOTES PANEL
   ============================================================ */
#notes-panel { width: 282px; flex-shrink: 0; display: none; flex-direction: column; background: var(--p1); border-left: 1px solid var(--bd); }
.np-header { padding: 11px 14px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.np-header h3 { font-size: .88rem; color: var(--t0); }
.np-header label { font-size: .74rem; color: var(--t2); display: flex; align-items: center; gap: 5px; cursor: pointer; }
.np-header input[type=checkbox] { cursor: pointer; accent-color: var(--ac); }
.np-hint { margin: 8px 12px 4px; padding: 7px 10px; background: var(--ac-bg); border: 1px dashed var(--ac2); border-radius: 7px; color: var(--ac); font-size: .76rem; text-align: center; flex-shrink: 0; opacity: .75; }
#notes-list { flex: 1; overflow-y: auto; padding: 6px 10px 10px; }
.note-item { background: var(--p2); border-left: 3px solid var(--ac); border-radius: 6px; padding: 9px 30px 9px 10px; margin-bottom: 7px; cursor: pointer; position: relative; transition: background .12s; }
.note-item:hover { background: var(--p3); }
.note-pg   { font-size: .68rem; color: var(--t2); margin-bottom: 3px; }
.note-quote { font-size: .74rem; color: var(--ac); border-left: 2px solid var(--ac2); padding: 3px 7px; margin-bottom: 4px; font-style: italic; word-break: break-all; line-height: 1.45; opacity: .85; }
.note-text { font-size: .8rem; color: var(--t1); line-height: 1.55; word-break: break-all; }
.note-time { font-size: .66rem; color: var(--t2); margin-top: 4px; }
.note-del  { position: absolute; top: 7px; right: 7px; font-size: .68rem; color: var(--t2); padding: 2px 5px; border-radius: 3px; cursor: pointer; }
.note-del:hover { background: rgba(200,60,60,.18); color: #e08080; }
.np-empty { color: var(--t2); text-align: center; padding: 30px 0; font-size: .82rem; }

/* ============================================================
   NOTE COMMENT (inline edit in panel)
   ============================================================ */
.note-comment-ta { width:100%; min-height:52px; background:var(--p0); border:1px solid var(--bd); border-radius:5px; color:var(--t0); padding:6px 8px; font-size:.8rem; resize:vertical; font-family:inherit; line-height:1.55; margin-top:6px; }
.note-comment-ta:focus { outline:none; border-color:var(--ac2); }
.note-actions { display:flex; align-items:center; justify-content:space-between; margin-top:5px; }
.note-save-btn { background:var(--ac-bg); border:1px solid var(--ac2); color:var(--ac); border-radius:5px; padding:3px 12px; font-size:.76rem; cursor:pointer; font-family:inherit; }
.note-save-btn:hover { opacity:.8; }

/* ============================================================
   TEXT VIEW
   ============================================================ */
#text-view { display: none; flex: 1; overflow-y: auto; background: var(--paper); color: #1a0e02; padding: 20px 18px 40px; font-size: 1.06rem; line-height: 2; word-break: break-all; font-family: 'Noto Serif SC','SimSun','STSong',serif; }
[data-theme="light"] #text-view { color: #1a1a2e; }
.tv-page { margin-bottom: 12px; }
.tv-pg-label { color: var(--t2); font-size: .7rem; text-align: center; border-top: 1px dashed var(--bd); margin: 18px 0 14px; padding-top: 6px; letter-spacing: .2em; }
.tv-content { white-space: pre-wrap; }
.tv-empty   { color: var(--t1); text-align: center; padding: 40px 0; font-size: .9rem; }

/* ============================================================
   TEXT LAYER
   ============================================================ */
.textLayer { position: absolute; inset: 0; overflow: hidden; line-height: 1; user-select: text; -webkit-user-select: text; pointer-events: auto; }
.textLayer span, .textLayer br { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; }
.textLayer ::selection      { background: var(--ac-bg); color: transparent; }
.textLayer ::-moz-selection { background: var(--ac-bg); color: transparent; }

/* ============================================================
   SELECTION BUTTON
   ============================================================ */
#sel-btn { display: none; position: fixed; z-index: 600; }
#sel-note-btn { background: var(--ac-bg); border: 1px solid var(--ac2); color: var(--ac); border-radius: 18px; padding: 7px 16px; font-size: .83rem; cursor: pointer; box-shadow: 0 2px 10px var(--shadow); white-space: nowrap; font-family: inherit; transition: opacity .12s; }
#sel-note-btn:hover { opacity: .82; }

/* ============================================================
   SKIN PANEL
   ============================================================ */
#skin-panel { display: none; position: fixed; z-index: 900; background: var(--p1); border: 1px solid var(--bd2); border-radius: 16px; padding: 18px 16px 14px; box-shadow: 0 10px 40px var(--shadow); width: 222px; }
.skin-title { font-size: .78rem; color: var(--t1); margin-bottom: 14px; text-align: center; letter-spacing: .1em; }
.skin-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.skin-opt { border: 2px solid var(--bd); border-radius: 12px; padding: 12px 6px 8px; cursor: pointer; text-align: center; transition: border-color .15s, transform .12s; font-size: .78rem; color: var(--t1); }
.skin-opt:hover   { transform: scale(1.04); }
.skin-opt.current { border-color: var(--ac); color: var(--ac); }
.skin-dot { width: 30px; height: 30px; border-radius: 50%; margin: 0 auto 7px; }

/* ============================================================
   TOAST
   ============================================================ */
#toast { position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%); background: var(--p3); color: var(--t0); padding: 8px 20px; border-radius: 20px; border: 1px solid var(--bd2); font-size: .82rem; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 400; white-space: nowrap; }
#toast.show { opacity: 1; }

/* ============================================================
   MOBILE
   ============================================================ */
@media (max-width: 640px) {
  .shelf-header { padding: 28px 16px 44px; }
  .shelf-header h1 { font-size: 1.28rem; letter-spacing: .12em; }
  #btn-skin-shelf { top: auto; bottom: 14px; transform: none; right: 14px; padding: 6px 12px; font-size: .76rem; }
  .shelf-section { padding: 8px 12px 0; }
  .shelf-row { gap: 10px; padding: 10px 0 16px; }
  .book-card { width: 90px; height: 128px; }
  .book-title-card { font-size: .78rem; }
  .book-sub { font-size: .58rem; }
  .toolbar { height: auto; flex-wrap: wrap; padding: 5px 8px; gap: 4px; row-gap: 0; }
  #book-title-bar { order: -1; flex-basis: 100%; text-align: left; font-size: .74rem; padding: 3px 0 5px; border-bottom: 1px solid var(--bd); margin-bottom: 3px; }
  .toolbar-divider { display: none; }
  .toolbar-btn { padding: 6px 10px; font-size: .74rem; min-height: 34px; }
  #zoom-pct { min-width: 28px; font-size: .72rem; }
  #notes-panel { position: fixed !important; inset: 0 !important; width: 100% !important; z-index: 300; }
  .reader-footer { height: 46px; gap: 10px; }
  .footer-btn { padding: 8px 18px; font-size: .86rem; min-height: 38px; }
  #page-in { width: 46px; font-size: .86rem; }
  #text-view { font-size: 1rem; padding: 14px 13px 30px; line-height: 1.9; }
  #note-popup { width: calc(100vw - 24px); left: 12px !important; }
  #skin-panel { width: calc(100vw - 40px); left: 20px; bottom: 20px; top: auto !important; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>正在加载书籍...</div>
</div>

<!-- ======================== BOOKSHELF ======================== -->
<div id="view-shelf">
  <div class="shelf-header">
    <h1><em>八字</em>阅览室</h1>
    <p>共 22 册 · 点击书籍开始阅读</p>
    <button id="btn-skin-shelf">🎨 换皮肤</button>
  </div>
  <div id="shelf-container"></div>
  <div style="height:60px"></div>
</div>

<!-- ======================== READER ======================== -->
<div id="view-reader">
  <div class="toolbar">
    <button class="toolbar-btn" id="btn-back">← 书架</button>
    <div class="toolbar-divider"></div>
    <div id="book-title-bar">—</div>
    <div class="toolbar-divider"></div>
    <div class="zoom-group">
      <button class="toolbar-btn" id="btn-zoom-out" title="缩小 (-)">A−</button>
      <span id="zoom-pct">140%</span>
      <button class="toolbar-btn" id="btn-zoom-in"  title="放大 (+)">A+</button>
    </div>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="btn-mode"  title="切换翻页/滚动">📖 翻页</button>
    <button class="toolbar-btn" id="btn-panel" title="查看笔记">📋 笔记</button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="btn-text-mode" title="流式阅读模式：文字自适应屏幕，适合手机">流式阅读</button>
    <button class="toolbar-btn" id="btn-export" title="导出笔记为文本">💾 导出</button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="btn-skin" title="换皮肤">🎨</button>
  </div>

  <div class="reader-body">
    <div id="reader-main">
      <!-- Page mode -->
      <div id="page-container">
        <div id="canvas-wrap">
          <canvas id="pdf-canvas"></canvas>
          <div id="annot-overlay"></div>
        </div>
      </div>
      <!-- Scroll mode -->
      <div id="scroll-wrap"></div>
    </div>

    <!-- Text view (reading mode) -->
    <div id="text-view"></div>

    <!-- Notes panel -->
    <div id="notes-panel">
      <div class="np-header">
        <h3>📌 笔记</h3>
        <div style="display:flex;align-items:center;gap:10px">
          <label><input type="checkbox" id="filter-pg"> 仅本页</label>
          <button id="btn-close-panel" style="display:none;background:#2a2a2a;border:1px solid #444;color:#aaa;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:0.8rem">✕ 关闭</button>
        </div>
      </div>
      <div class="np-hint">选中文字后点击"添加到笔记"即可收录</div>
      <div id="notes-list"></div>
    </div>
  </div>

  <div class="reader-footer" id="reader-footer">
    <button class="footer-btn" id="btn-prev">◀ 上一页</button>
    <div style="display:flex;align-items:center;gap:8px">
      <input type="number" id="page-in" min="1" value="1">
      <span id="page-total">/ 0 页</span>
    </div>
    <button class="footer-btn" id="btn-next">下一页 ▶</button>
    <span id="progress-pct"></span>
  </div>
</div>

<div id="sel-btn"><button id="sel-note-btn">📌 添加到笔记</button></div>

<!-- ======================== SKIN PANEL ======================== -->
<div id="skin-panel">
  <div class="skin-title">选择皮肤</div>
  <div class="skin-grid">
    <div class="skin-opt current" data-theme="">
      <div class="skin-dot" style="background:linear-gradient(135deg,#9d7fe0,#0d0d18)"></div>暗夜紫
    </div>
    <div class="skin-opt" data-theme="light">
      <div class="skin-dot" style="background:linear-gradient(135deg,#5b6ef5,#eef0fc)"></div>晴日白
    </div>
    <div class="skin-opt" data-theme="green">
      <div class="skin-dot" style="background:linear-gradient(135deg,#3dd68c,#091a10)"></div>竹韵绿
    </div>
    <div class="skin-opt" data-theme="warm">
      <div class="skin-dot" style="background:linear-gradient(135deg,#ff7043,#150a04)"></div>暮色橙
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
//  PDF.js worker
// ============================================================
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ============================================================
//  BOOK LIST
// ============================================================
const BOOKS = [
  // 班级教材
  { id: 3,  series:'班级', color:'#1E5E30', sub:'民间实用八字', title:'初级班',
    file:'大任老资料/03、任付红-《民间实用八字初级班》.pdf' },
  { id: 15, series:'班级', color:'#1A3D6A', sub:'民间实用八字', title:'中级班',
    file:'大任老资料/15、任付红-《民间实用八字中级班》.pdf' },
  { id: 5,  series:'班级', color:'#6A1414', sub:'民间实用八字', title:'高级班',
    file:'大任老资料/05、任付红-《民间实用八字高级班》.pdf' },
  // 实战系列
  { id: 4,  series:'实战', color:'#3A1060', sub:'民间实用八字', title:'断命例题解',
    file:'大任老资料/04、任付红-《民间实用八字断命例题解》.pdf' },
  { id: 11, series:'实战', color:'#5E1010', sub:'民间实用八字', title:'实战技巧',
    file:'大任老资料/11、任付红-《民间实用八字实战技巧》.pdf' },
  { id: 16, series:'实战', color:'#4A0C30', sub:'民间实用八字', title:'实战技巧·完整版',
    file:'大任老资料/16、任付红-《民间实用八字实战技巧》完整版.pdf' },
  // 专题篇
  { id: 1,  series:'专题', color:'#7A3A10', sub:'民间实用八字', title:'财运篇',
    file:'大任老资料/01、任付红-《民间实用八字财运篇》.pdf' },
  { id: 2,  series:'专题', color:'#7A1A1A', sub:'民间实用八字', title:'车祸篇',
    file:'大任老资料/02、任付红《民间实用八字车祸篇》.pdf' },
  { id: 6,  series:'专题', color:'#7A5A10', sub:'民间实用八字', title:'官运篇',

// ============================================================
//  STORAGE HELPERS
// ============================================================
const nKey = id => `daren_notes_${id}`;
const pKey = id => `daren_prog_${id}`;

function getNotes(id) {
  try { return JSON.parse(localStorage.getItem(nKey(id)) || '{}'); }
  catch { return {}; }
}
function saveNotes(id, data) {
  localStorage.setItem(nKey(id), JSON.stringify(data));
}
function getProgress(id) {
  return parseInt(localStorage.getItem(pKey(id)) || '1') || 1;
}
function saveProgress(id, pg) {
  localStorage.setItem(pKey(id), pg);
}
function addNote(id, pg, quote) {
  const d = getNotes(id);
  if (!d[pg]) d[pg] = [];
  const note = { id: Date.now(), quote, comment: '',
                 at: new Date().toLocaleString('zh-CN') };
  d[pg].push(note);
  saveNotes(id, d);
  return note;
}
function updateNoteComment(bookId, pg, noteId, comment) {
  const d = getNotes(bookId);
  (d[pg] || []).forEach(n => { if (n.id === noteId) n.comment = comment; });
  saveNotes(bookId, d);
}
function deleteNote(bookId, pg, noteId) {
  const d = getNotes(bookId);
  if (d[pg]) {
    d[pg] = d[pg].filter(n => n.id !== noteId);
    if (!d[pg].length) delete d[pg];
  }
  saveNotes(bookId, d);
}
function totalNoteCount(id) {
  const d = getNotes(id);
  return Object.values(d).reduce((s,a)=>s+a.length, 0);
}

function renderShelf() {
  const cnt = document.getElementById('shelf-container');
  cnt.innerHTML = '';

  const groups = {};
  BOOKS.forEach(b => {
    if (!groups[b.series]) groups[b.series] = [];
    groups[b.series].push(b);
  });

  SERIES_ORDER.forEach(s => {
    if (!groups[s]) return;
    const sec = document.createElement('div');
    sec.className = 'shelf-section';

    const lbl = document.createElement('div');
    lbl.className = 'shelf-section-label';
    lbl.textContent = SERIES_LABELS[s];
    sec.appendChild(lbl);

    const plank = document.createElement('div');
    plank.className = 'shelf-row';

    groups[s].forEach(b => {
      const nc = totalNoteCount(b.id);
      const prog = getProgress(b.id);
      const card = document.createElement('div');
      card.className = 'book-card';
      card.style.background =
        `linear-gradient(135deg, ${lighten(b.color,18)} 0%, ${b.color} 55%, ${darken(b.color,18)} 100%)`;

      card.innerHTML = `
        <div class="book-num">No.${String(b.id).padStart(2,'0')}</div>
        ${nc > 0 ? `<div class="book-badge">📌${nc}</div>` : ''}
        <div class="book-title-card">${b.title}</div>
        <div class="book-sub">${b.sub}</div>
        <div class="book-progress-strip">
          <div class="book-progress-fill" style="width:0%"></div>
        </div>`;

      card.addEventListener('click', () => openBook(b));
      plank.appendChild(card);
    });

    sec.appendChild(plank);
    cnt.appendChild(sec);
  });
}

function lighten(hex, amt) { return shiftHex(hex, amt); }
function darken(hex, amt)  { return shiftHex(hex, -amt); }
function shiftHex(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, Math.min(255, (n>>16) + amt));
  const g = Math.max(0, Math.min(255, ((n>>8)&255) + amt));
  const b = Math.max(0, Math.min(255, (n&255) + amt));
  return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

async function openBook(book) {
  S.book = book;
  S.page = getProgress(book.id);
  S.pdf  = null;
  S.noteMode = false;

  document.getElementById('view-shelf').style.display = 'none';
  const rv = document.getElementById('view-reader');
  rv.style.display = 'flex';

  document.getElementById('book-title-bar').textContent =
    `${book.sub} · ${book.title}`;

  showLoad(true);
  try {
    S.pdf = await pdfjsLib.getDocument(book.file).promise;
    S.total = S.pdf.numPages;
    document.getElementById('page-total').textContent = `/ ${S.total} 页`;
    document.getElementById('page-in').max = S.total;

    // Auto-fit scale on mobile based on first page width
    if (window.innerWidth <= 640) {
      const firstPage = await S.pdf.getPage(1);
      const vp1 = firstPage.getViewport({ scale: 1 });
      const availW = document.getElementById('reader-main').clientWidth - 32;
      S.scale = Math.min(1.4, Math.max(0.5, availW / vp1.width));
    }
    document.getElementById('zoom-pct').textContent = Math.round(S.scale*100) + '%';

    if (S.scrollMode) {
      await renderScroll();
    } else {
      await renderPage(S.page);
    }
    refreshPanel();
  } catch(e) {
    showLoad(false);
    const isFileProtocol = location.protocol === 'file:';
    alert(
      `⚠ 无法加载 PDF\n\n` +
      (isFileProtocol
        ? `当前是直接打开文件，浏览器安全限制禁止加载 PDF。\n\n✅ 解决方法：\n双击同目录下的「启动阅读器.bat」\n用本地服务器打开（地址自动跳到 localhost:8765）`
        : `原因：${e.message}`)
    );
    goShelf();
    return;
  }
  showLoad(false);
}

// ============================================================
//  RENDER PAGE (flip mode)
// ============================================================
async function renderPage(pg, dir) {
  if (!S.pdf) return;
  pg = Math.max(1, Math.min(pg, S.total));
  S.page = pg;

  const page     = await S.pdf.getPage(pg);
  const viewport = page.getViewport({ scale: S.scale });
  const canvas   = document.getElementById('pdf-canvas');
  const ctx      = canvas.getContext('2d');

  canvas.width  = viewport.width;
  canvas.height = viewport.height;

  // Wrap sizing (for overlay alignment)
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.width  = viewport.width  + 'px';
  wrap.style.height = viewport.height + 'px';

  if (dir) {
    canvas.classList.remove('anim-right','anim-left');
    void canvas.offsetWidth;
    canvas.classList.add(dir === 'next' ? 'anim-right' : 'anim-left');
  }

  await page.render({ canvasContext: ctx, viewport }).promise;

  // Text layer — enables text selection; silently skips image-only PDFs
  const existingTL = wrap.querySelector('.textLayer');
  if (existingTL) existingTL.remove();
  try {
    const textContent = await page.getTextContent();
    const tld = document.createElement('div');
    tld.className = 'textLayer';
    wrap.insertBefore(tld, document.getElementById('annot-overlay'));
    const task = pdfjsLib.renderTextLayer({
      textContent, container: tld, viewport, textDivs: [],
    });
    if (task && task.promise) await task.promise;
  } catch(e) {}

  document.getElementById('page-in').value = pg;
  document.getElementById('progress-pct').textContent =
    Math.round(pg / S.total * 100) + '%';
  document.getElementById('btn-prev').disabled = pg <= 1;
  document.getElementById('btn-next').disabled = pg >= S.total;

  saveProgress(S.book.id, pg);
  refreshPanel();
  document.getElementById('reader-main').scrollTo(0, 0);
}

// ============================================================
//  RENDER SCROLL MODE
// ============================================================
async function renderScroll() {
  const wrap = document.getElementById('scroll-wrap');
  wrap.innerHTML = '';
  if (!S.pdf) return;
  showLoad(true);
  for (let i = 1; i <= S.total; i++) {
    const page     = await S.pdf.getPage(i);
    const viewport = page.getViewport({ scale: S.scale });
    const canvas   = document.createElement('canvas');
    canvas.className = 'scroll-canvas';
    canvas.width  = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    const lbl = document.createElement('div');
    lbl.className = 'scroll-page-label';
    lbl.textContent = `第 ${i} 页`;

    wrap.appendChild(canvas);
    wrap.appendChild(lbl);
  }
  showLoad(false);
}

let _selText = '', _selRect = null;

function checkSel() {
  if (document.getElementById('view-reader').style.display === 'none') return;
  if (S.scrollMode) return;
  const sel = window.getSelection();
  const txt = sel ? sel.toString().trim() : '';
  if (txt.length > 1 && sel.rangeCount > 0) {
    _selText = txt;
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    _selRect = rect;
    const btn = document.getElementById('sel-btn');
    btn.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 150)) + 'px';
    btn.style.top  = Math.min(rect.bottom + 8, window.innerHeight - 52) + 'px';
    btn.style.display = 'block';
  } else {
    hideSelBtn();
  }
}

function hideSelBtn() {
  document.getElementById('sel-btn').style.display = 'none';
  _selText = '';
  _selRect = null;
}

document.addEventListener('mouseup',  () => setTimeout(checkSel, 30));
document.addEventListener('touchend', () => setTimeout(checkSel, 80));

document.getElementById('sel-note-btn').addEventListener('click', () => {
  if (!_selText || !S.book) { hideSelBtn(); return; }
  addNote(S.book.id, S.page, _selText);

//  NOTES PANEL
// ============================================================
function refreshPanel() {
  if (!S.panelOpen) return;
  const list = document.getElementById('notes-list');
  list.innerHTML = '';
  if (!S.book) return;

  const data   = getNotes(S.book.id);
  const filter = document.getElementById('filter-pg').checked;

  let all = [];
  Object.entries(data).forEach(([pg, arr]) =>
    arr.forEach(n => all.push({ ...n, pg: +pg })));
  all.sort((a,b) => a.pg - b.pg || a.id - b.id);
  if (filter) all = all.filter(n => n.pg === S.page);

  if (!all.length) {
    list.innerHTML = '<div class="np-empty">暂无笔记<br><span style="font-size:.74rem;opacity:.6">选中文字后点击「添加到笔记」</span></div>';
    return;
  }

  all.forEach(n => {
    const quote   = n.quote || n.text || '';
    const comment = n.comment != null ? n.comment : (n.text && n.quote ? n.text : '');
    const el = document.createElement('div');
    el.className = 'note-item';
    el.style.borderLeftColor = n.color || 'var(--ac)';
    el.innerHTML = `
      <div class="note-pg">第 ${n.pg} 页 <span style="float:right;cursor:pointer;color:var(--t2);font-size:.72rem" data-del>✕ 删除</span></div>
      ${quote ? `<div class="note-quote">「${esc(quote)}」</div>` : ''}
      <textarea class="note-comment-ta" placeholder="写下你的想法…" rows="2">${esc(comment)}</textarea>
      <div class="note-actions">
        <button class="note-save-btn" data-save>保存想法</button>
        <span class="note-time">${n.at}</span>
      </div>`;

    el.querySelector('[data-del]').addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('删除这条笔记？')) {
        deleteNote(S.book.id, n.pg, n.id);
        refreshPanel();
      }
    });

    el.querySelector('[data-save]').addEventListener('click', e => {
      e.stopPropagation();
      const ta = el.querySelector('.note-comment-ta');
      updateNoteComment(S.book.id, n.pg, n.id, ta.value);
      toast('想法已保存');
    });

    el.addEventListener('click', e => {
      if (e.target.dataset.del != null || e.target.dataset.save != null) return;
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
      if (!S.scrollMode && n.pg !== S.page) renderPage(n.pg, 'next');
    });

    list.appendChild(el);
  });
}

document.getElementById('filter-pg').addEventListener('change', refreshPanel);

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\n/g,'<br>');
}

document.getElementById('btn-export').addEventListener('click', () => {
  if (!S.book) { toast('请先打开一本书'); return; }
  const data  = getNotes(S.book.id);
  const pages = Object.keys(data).map(Number).sort((a,b)=>a-b);

  let out = `${S.book.sub}·${S.book.title}  读书笔记\n`;
  out += `导出时间：${new Date().toLocaleString('zh-CN')}\n`;
  out += '─'.repeat(40) + '\n\n';
  pages.forEach(pg => {
    data[pg].forEach(n => {
      out += `▎第 ${pg} 页\n${n.text}\n（${n.at}）\n\n`;
    });

  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([out], {type:'text/plain;charset=utf-8'})),

  URL.revokeObjectURL(a.href);

// ============================================================
//  TEXT MODE (reading mode)
// ============================================================
function extractPageText(tc) {
  const LINE_GAP = 6;
  const lines = [];
  (tc.items || []).forEach(item => {
    if (!item.str) return;
    const y = item.transform[5];
    let line = lines.find(l => Math.abs(l.y - y) <= LINE_GAP);
    if (!line) { line = { y, parts: [] }; lines.push(line); }
    line.parts.push({ x: item.transform[4], str: item.str });
  });
  lines.sort((a, b) => b.y - a.y);
  return lines.map(l => {
    l.parts.sort((a, b) => a.x - b.x);
    return l.parts.map(p => p.str).join('');
  }).filter(Boolean).join('\n');
}

async function enterTextMode() {
  S.textMode = true;
  document.getElementById('btn-text-mode').classList.add('active');
  document.getElementById('reader-main').style.display    = 'none';
  document.getElementById('reader-footer').style.display  = 'none';
  document.getElementById('text-view').style.display      = 'block';

  const tv = document.getElementById('text-view');
  tv.innerHTML = '<div class="tv-empty">正在提取文字，请稍候…</div>';
  showLoad(true);

  let html = '';
  let hasText = false;
  for (let i = 1; i <= S.total; i++) {
    const page = await S.pdf.getPage(i);
    const tc   = await page.getTextContent();
    const txt  = extractPageText(tc);
    if (txt.trim()) hasText = true;
    html += `<div class="tv-page">
      <div class="tv-pg-label">第 ${i} 页</div>
      <div class="tv-content">${esc(txt) || '<span style="color:#ccc">（本页无文字）</span>'}</div>
    </div>`;
  }

  showLoad(false);
  if (!hasText) {
    tv.innerHTML = '<div class="tv-empty">此书为扫描图片，无法提取文字<br>请使用 PDF 模式阅读</div>';
  } else {
    tv.innerHTML = html;
    tv.scrollTo(0, 0);
  }
}

function exitTextMode() {
  S.textMode = false;
  document.getElementById('btn-text-mode').classList.remove('active');
  document.getElementById('text-view').style.display   = 'none';
  document.getElementById('reader-main').style.display = 'flex';
  if (!S.scrollMode) {
    document.getElementById('reader-footer').style.display = 'flex';

}

document.getElementById('btn-text-mode').addEventListener('click', () => {

});

  if (S.page > 1) renderPage(S.page - 1, 'prev');
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (S.page < S.total) renderPage(S.page + 1, 'next');
});
document.getElementById('page-in').addEventListener('change', e => {
  const p = parseInt(e.target.value);
  if (p >= 1 && p <= S.total) renderPage(p, 'next');
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (document.getElementById('view-reader').style.display === 'none') return;
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    { e.preventDefault(); if (S.page>1)      renderPage(S.page-1,'prev'); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  { e.preventDefault(); if (S.page<S.total) renderPage(S.page+1,'next'); }
  if (e.key === 'Escape')   { hideSelBtn(); }
  if (e.key === '+' || e.key === '=') zoom(+0.1);
  if (e.key === '-')                  zoom(-0.1);
});

// Touch swipe
let touchX0 = 0;
document.getElementById('reader-main').addEventListener('touchstart', e => {
  touchX0 = e.touches[0].clientX;
}, { passive: true });
document.getElementById('reader-main').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX0;
  if (Math.abs(dx) > 60) {
    if (dx < 0 && S.page < S.total) renderPage(S.page+1,'next');
    if (dx > 0 && S.page > 1)       renderPage(S.page-1,'prev');
  }
});

// ============================================================
//  UTILS
// ============================================================
function showLoad(on) {
  document.getElementById('loading').style.display = on ? 'flex' : 'none';
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ============================================================
//  INIT
// ============================================================
// ============================================================
//  SKIN SWITCHER
// ============================================================
const SKINS = [
  { theme: '',      label: '暗夜紫' },
  { theme: 'light', label: '晴日白' },
  { theme: 'green', label: '竹韵绿' },
  { theme: 'warm',  label: '暮色橙' },
];

function applySkin(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('daren_skin', theme);
  document.querySelectorAll('.skin-opt').forEach(el =>
    el.classList.toggle('current', el.dataset.theme === theme));
  closeSkinPanel();
}

function openSkinPanel(anchorEl) {
  const panel = document.getElementById('skin-panel');
  if (panel.style.display === 'block') { closeSkinPanel(); return; }
  const rect = anchorEl.getBoundingClientRect();
  if (window.innerWidth > 640) {
    panel.style.top  = (rect.bottom + 8) + 'px';
    panel.style.left = Math.min(rect.left, window.innerWidth - 240) + 'px';
    panel.style.bottom = 'auto';
  }
  panel.style.display = 'block';
}
function closeSkinPanel() {
  document.getElementById('skin-panel').style.display = 'none';
}

document.getElementById('btn-skin-shelf').addEventListener('click', e => openSkinPanel(e.currentTarget));
document.getElementById('btn-skin').addEventListener('click', e => openSkinPanel(e.currentTarget));

document.querySelectorAll('.skin-opt').forEach(el =>
  el.addEventListener('click', () => applySkin(el.dataset.theme)));

document.addEventListener('click', e => {
  const panel = document.getElementById('skin-panel');
  if (panel.style.display === 'block' &&
      !panel.contains(e.target) &&
      e.target.id !== 'btn-skin' &&
      e.target.id !== 'btn-skin-shelf') {
    closeSkinPanel();
  }
});

// Restore saved skin
const savedSkin = localStorage.getItem('daren_skin') || '';
if (savedSkin) applySkin(savedSkin);
else document.querySelectorAll('.skin-opt').forEach(el => el.classList.toggle('current', el.dataset.theme === ''));

renderShelf();
</script>
